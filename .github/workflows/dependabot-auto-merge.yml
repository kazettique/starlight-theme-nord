name: Dependabot Auto Merge

on:
  workflow_run:
    workflows: ["Build Check"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.login == 'dependabot[bot]' && startsWith(github.event.workflow_run.head_branch, 'dependabot/bun/')


    steps:
      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v9
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });
            if (!prs.length) {
              core.setFailed('No open PR found for branch: ' + context.payload.workflow_run.head_branch);
              return;
            }
            return prs[0].number;

      - name: Approve PR
        run: gh pr review ${{ steps.find-pr.outputs.result }} --approve --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        run: gh pr merge ${{ steps.find-pr.outputs.result }} --merge --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
